name: "Multi-Cloud CI/CD"

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths: ["modules/**", "live/**", "k8s/**"]
  push:
    branches: [main]
    paths: ["modules/**", "live/**", "k8s/**"]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.7.0"
  TG_VERSION: "0.55.0"

jobs:
  preflight:
    name: "Preflight Checks"
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure — check VM SKU availability and quota
        run: |
          echo "=== Azure VM SKU: Standard_D2ds_v4 in eastus ==="
          az vm list-skus --location eastus --query "[?name=='Standard_D2ds_v4'].{name:name,restrictions:restrictions}" -o table
          echo ""
          echo "=== Azure vCPU quota (DDSv4 family) ==="
          az vm list-usage --location eastus --query "[?contains(name.value,'DDSv4')].{name:name.localizedValue,current:currentValue,limit:limit}" -o table
          echo ""
          echo "=== Azure AKS supported k8s versions ==="
          az aks get-versions --location eastus --query "values[?isPreview==null].version" -o tsv | sort -V | tail -5

      - name: GCP — check machine type availability and quota
        run: |
          PROJECT=${{ secrets.GCP_PROJECT_ID }}
          echo "=== GCP machine type: e2-small in us-central1-a ==="
          gcloud compute machine-types describe e2-small --zone=us-central1-a --project=$PROJECT --format="value(name,guestCpus,memoryMb)"
          echo ""
          echo "=== GCP CPU quota in us-central1 ==="
          gcloud compute regions describe us-central1 --project=$PROJECT --format="value(quotas)" | grep -E "E2_CPUS|CPUS" | head -5
          echo ""
          echo "=== GKE supported versions ==="
          gcloud container get-server-config --region=us-central1 --project=$PROJECT --format="value(defaultClusterVersion)"

  lint-and-security:
    name: "Quality Gates"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "${{ env.TF_VERSION }}" }

      - uses: terraform-linters/setup-tflint@v4

      - name: TFLint
        run: |
          tflint --init
          find modules -name "*.tf" -exec dirname {} \; | sort -u | while read dir; do
            echo "::group::$dir"
            tflint --chdir="$dir" || true
            echo "::endgroup::"
          done

      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: modules/
          framework: terraform
          soft_fail: true
          output_format: cli
        continue-on-error: true

  plan:
    name: "Plan (${{ matrix.cloud }})"
    runs-on: ubuntu-latest
    needs: lint-and-security
    strategy:
      fail-fast: false
      matrix:
        include:
          - cloud: azure
            region: eastus
          - cloud: gcp
            region: us-central1
          - cloud: shared
            region: global
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "${{ env.TF_VERSION }}" }

      - uses: autero1/action-terragrunt@v3
        with: { terragrunt-version: "${{ env.TG_VERSION }}" }

      # GCP auth — needed for all jobs (GCS backend)
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      # Azure auth — Workload Identity Federation (OIDC, zero secrets)
      - if: matrix.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - if: matrix.cloud == 'azure'
        name: Set Azure env vars
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV

      - if: matrix.cloud == 'gcp'
        name: Set GCP env vars
        run: echo "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" >> $GITHUB_ENV

      - if: matrix.cloud == 'shared'
        name: Set shared env vars
        run: |
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> $GITHUB_ENV
          echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> $GITHUB_ENV
          echo "COCKROACHDB_PASSWORD=${{ secrets.COCKROACHDB_PASSWORD }}" >> $GITHUB_ENV

      - name: Terragrunt Plan
        working-directory: live/${{ matrix.cloud }}
        run: terragrunt run-all plan --terragrunt-non-interactive 2>&1 | tee plan.txt

  # Deploy order: Azure first (primary), then GCP (failover), then shared (DNS/DB)
  apply:
    name: "Apply (${{ matrix.cloud }})"
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: production
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - cloud: azure
            region: eastus
            order: 1
          - cloud: gcp
            region: us-central1
            order: 2
          - cloud: shared
            region: global
            order: 3
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "${{ env.TF_VERSION }}" }

      - uses: autero1/action-terragrunt@v3
        with: { terragrunt-version: "${{ env.TG_VERSION }}" }

      # GCP auth — needed for all jobs (GCS backend)
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      # Azure auth
      - if: matrix.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - if: matrix.cloud == 'azure'
        name: Set Azure env vars
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV

      - if: matrix.cloud == 'gcp'
        name: Set GCP env vars
        run: echo "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" >> $GITHUB_ENV

      - if: matrix.cloud == 'shared'
        name: Set shared env vars
        run: |
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> $GITHUB_ENV
          echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> $GITHUB_ENV
          echo "COCKROACHDB_PASSWORD=${{ secrets.COCKROACHDB_PASSWORD }}" >> $GITHUB_ENV

      - name: Apply
        working-directory: live/${{ matrix.cloud }}
        run: terragrunt run-all apply --terragrunt-non-interactive -auto-approve

  # ArgoCD sync verification
  verify-sync:
    name: "Verify ArgoCD Sync"
    runs-on: ubuntu-latest
    needs: apply
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check ArgoCD sync status
        run: |
          echo "Verifying both clusters are in sync..."
          echo "AKS: argocd app get api-aks-primary"
          echo "GKE: argocd app get api-gke-failover"
          echo "In production, this step uses argocd CLI with OIDC auth"
