# GKE failover cluster — 1 replica, minimal resources, OTel direct to trace-streamer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "trace-streamer:4317"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
